- hosts: box1
  become: yes

  tasks:
  - name: ping
    ansible.builtin.shell: ping -c 5 192.168.2.1
    register: out
  
  - debug: var=out.stdout_lines

- hosts: box2
  become: yes

  tasks:
  - name: show docker ps
    ansible.builtin.shell: docker ps
    register: out
  
  - debug: var=out.stdout_lines